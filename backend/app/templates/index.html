<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="card">
      <h1>Lectorium</h1>
      <p>Self-hosted EPUB audiobook reader with browser TTS.</p>
    </div>

    <div class="card">
      <h2>Upload an EPUB</h2>
      <form id="upload-form" enctype="multipart/form-data">
        <input id="upload-file" type="file" name="file" accept=".epub" required />
        <button class="primary" type="submit">Upload</button>
      </form>
      <div id="upload-status" class="muted"></div>
    </div>

    <div class="layout">
      <div class="card">
        <h2>Library</h2>
        <div id="library" class="library-list">
          <p class="muted">No books uploaded yet.</p>
        </div>
      </div>

      <div class="card">
        <h2 id="book-title">Select a book</h2>
        <div class="controls">
          <button id="prev-btn" type="button">Prev</button>
          <button id="next-btn" type="button">Next</button>
          <button id="play-btn" class="primary" type="button">Play</button>
          <button id="pause-btn" type="button">Pause</button>
          <button id="stop-btn" type="button">Stop</button>
          <label for="language-select">Language</label>
          <select id="language-select">
            <option value="de">DE</option>
            <option value="en" selected>EN</option>
            <option value="es">ES</option>
            <option value="fr">FR</option>
            <option value="it">IT</option>
            <option value="nl">NL</option>
            <option value="pt">PT</option>
            <option value="all">All</option>
          </select>
          <label for="voice-select">Voice</label>
          <select id="voice-select"></select>
          <div class="control-group">
            <label for="rate-input">Rate</label>
            <input id="rate-input" type="range" min="0.5" max="2" step="0.1" value="1" />
          </div>
        </div>
        <div id="reader" class="reader-box"></div>
      </div>
    </div>

    <p>Health endpoint: <a href="/health"><code>/health</code></a></p>

    <script src="/static/app.js"></script>
  </body>
</html>
