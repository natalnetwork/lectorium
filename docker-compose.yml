services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/data
    expose:
      - "8000"

  nginx:
    image: nginx:stable
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
